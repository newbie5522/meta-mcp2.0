services:
  postgres:
    image: postgres:16-alpine
    mem_limit: 256m
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "max_wal_size=256MB"
      - "-c"
      - "checkpoint_timeout=10min"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-meta_ads_analytics}
      - POSTGRES_USER=${POSTGRES_USER:-meta_ads}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    mem_limit: 128m
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "96mb", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  meta-ads-store-analytics-mcp:
    build: .
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=256
      - READ_ONLY_MODE=true
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL in .env}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - SERVER_URL=${SERVER_URL:-http://localhost:3000}
      - PORT=3000
      - API_KEY=${API_KEY:-}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:?set ADMIN_USERNAME in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET in .env}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN:-}
      - META_TOKENS=${META_TOKENS:-}
      - META_API_VERSION=${META_API_VERSION:-v25.0}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://claude.ai}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:?set TOKEN_ENCRYPTION_KEY in .env}
      - SHOPLINE_API_VERSION=${SHOPLINE_API_VERSION:-v20240301}
      - SHOPLAZZA_API_VERSION=${SHOPLAZZA_API_VERSION:-2025-06}
      - SHOPLINE_ORDERS_PATH=${SHOPLINE_ORDERS_PATH:-}
      - SHOPLAZZA_ORDERS_PATH=${SHOPLAZZA_ORDERS_PATH:-}
      - SHOPLINE_PROFILE_PATH=${SHOPLINE_PROFILE_PATH:-}
      - SHOPLAZZA_PROFILE_PATH=${SHOPLAZZA_PROFILE_PATH:-}
      - SHOPLINE_TOKEN_HEADER=${SHOPLINE_TOKEN_HEADER:-Authorization}
      - SHOPLAZZA_TOKEN_HEADER=${SHOPLAZZA_TOKEN_HEADER:-access-token}
      - SHOPLINE_TOKEN_HEADER_VALUE=${SHOPLINE_TOKEN_HEADER_VALUE:-Bearer {token}}
      - SHOPLAZZA_TOKEN_HEADER_VALUE=${SHOPLAZZA_TOKEN_HEADER_VALUE:-{token}}
      - SYNC_SCHEDULER_ENABLED=${SYNC_SCHEDULER_ENABLED:-false}
      - WORKER_ENABLED=${WORKER_ENABLED:-true}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-1}
      - SYNC_START_DELAY_SECONDS=${SYNC_START_DELAY_SECONDS:-30}
      - ORDER_SYNC_ENABLED=${ORDER_SYNC_ENABLED:-false}
      - ORDER_SYNC_INTERVAL_MINUTES=${ORDER_SYNC_INTERVAL_MINUTES:-1440}
      - ORDER_SYNC_LOOKBACK_DAYS=${ORDER_SYNC_LOOKBACK_DAYS:-3}
      - ORDER_SYNC_LIMIT=${ORDER_SYNC_LIMIT:-100}
      - META_AD_ACCOUNTS_SYNC_ENABLED=${META_AD_ACCOUNTS_SYNC_ENABLED:-false}
      - META_AD_ACCOUNTS_SYNC_INTERVAL_MINUTES=${META_AD_ACCOUNTS_SYNC_INTERVAL_MINUTES:-360}
      - META_AD_ACCOUNTS_ACTIVE_LAST_DAYS=${META_AD_ACCOUNTS_ACTIVE_LAST_DAYS:-90}
      - META_AD_ACCOUNTS_SYNC_LIMIT=${META_AD_ACCOUNTS_SYNC_LIMIT:-500}
      - META_STRUCTURE_SYNC_ENABLED=${META_STRUCTURE_SYNC_ENABLED:-false}
      - META_STRUCTURE_SYNC_INTERVAL_MINUTES=${META_STRUCTURE_SYNC_INTERVAL_MINUTES:-360}
      - META_STRUCTURE_SYNC_LIMIT=${META_STRUCTURE_SYNC_LIMIT:-500}
      - META_STRUCTURE_SYNC_MAX_PAGES=${META_STRUCTURE_SYNC_MAX_PAGES:-10}
      - META_CREATIVES_SYNC_ENABLED=${META_CREATIVES_SYNC_ENABLED:-false}
      - META_CREATIVES_SYNC_INTERVAL_MINUTES=${META_CREATIVES_SYNC_INTERVAL_MINUTES:-720}
      - META_CREATIVES_SYNC_LIMIT=${META_CREATIVES_SYNC_LIMIT:-250}
      - META_CREATIVES_SYNC_MAX_PAGES=${META_CREATIVES_SYNC_MAX_PAGES:-10}
      - META_INSIGHTS_SYNC_ENABLED=${META_INSIGHTS_SYNC_ENABLED:-false}
      - META_INSIGHTS_SYNC_INTERVAL_MINUTES=${META_INSIGHTS_SYNC_INTERVAL_MINUTES:-1440}
      - META_INSIGHTS_SYNC_DAYS=${META_INSIGHTS_SYNC_DAYS:-3}
      - META_INSIGHTS_SYNC_MAX_PAGES=${META_INSIGHTS_SYNC_MAX_PAGES:-10}
      - META_INSIGHTS_SYNC_ACCOUNT_LIMIT=${META_INSIGHTS_SYNC_ACCOUNT_LIMIT:-50}
      - META_INSIGHTS_SYNC_UNMAPPED_ACCOUNTS=${META_INSIGHTS_SYNC_UNMAPPED_ACCOUNTS:-true}
      - META_BREAKDOWN_SYNC_ENABLED=${META_BREAKDOWN_SYNC_ENABLED:-true}
      - FAILED_SYNC_RETRY_ENABLED=${FAILED_SYNC_RETRY_ENABLED:-false}
      - FAILED_SYNC_RETRY_INTERVAL_MINUTES=${FAILED_SYNC_RETRY_INTERVAL_MINUTES:-60}
      - FAILED_SYNC_RETRY_LIMIT=${FAILED_SYNC_RETRY_LIMIT:-10}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  worker:
    build: .
    mem_limit: 256m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/apps/worker/src/index.js"]
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=192
      - READ_ONLY_MODE=true
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL in .env}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN:-}
      - META_TOKENS=${META_TOKENS:-}
      - META_API_VERSION=${META_API_VERSION:-v25.0}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:?set TOKEN_ENCRYPTION_KEY in .env}
      - SHOPLINE_API_VERSION=${SHOPLINE_API_VERSION:-v20240301}
      - SHOPLAZZA_API_VERSION=${SHOPLAZZA_API_VERSION:-2025-06}
      - SHOPLINE_ORDERS_PATH=${SHOPLINE_ORDERS_PATH:-}
      - SHOPLAZZA_ORDERS_PATH=${SHOPLAZZA_ORDERS_PATH:-}
      - SHOPLINE_PROFILE_PATH=${SHOPLINE_PROFILE_PATH:-}
      - SHOPLAZZA_PROFILE_PATH=${SHOPLAZZA_PROFILE_PATH:-}
      - SHOPLINE_TOKEN_HEADER=${SHOPLINE_TOKEN_HEADER:-Authorization}
      - SHOPLAZZA_TOKEN_HEADER=${SHOPLAZZA_TOKEN_HEADER:-access-token}
      - SHOPLINE_TOKEN_HEADER_VALUE=${SHOPLINE_TOKEN_HEADER_VALUE:-Bearer {token}}
      - SHOPLAZZA_TOKEN_HEADER_VALUE=${SHOPLAZZA_TOKEN_HEADER_VALUE:-{token}}
      - SYNC_SCHEDULER_ENABLED=true
      - WORKER_ENABLED=${WORKER_ENABLED:-true}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-1}
      - ORDER_SYNC_ENABLED=${ORDER_SYNC_ENABLED:-true}
      - ORDER_SYNC_INTERVAL_MINUTES=${ORDER_SYNC_INTERVAL_MINUTES:-60}
      - ORDER_SYNC_LOOKBACK_DAYS=${ORDER_SYNC_LOOKBACK_DAYS:-7}
      - ORDER_SYNC_LIMIT=${ORDER_SYNC_LIMIT:-100}
      - META_AD_ACCOUNTS_SYNC_ENABLED=${META_AD_ACCOUNTS_SYNC_ENABLED:-true}
      - META_AD_ACCOUNTS_SYNC_INTERVAL_MINUTES=${META_AD_ACCOUNTS_SYNC_INTERVAL_MINUTES:-360}
      - META_AD_ACCOUNTS_ACTIVE_LAST_DAYS=${META_AD_ACCOUNTS_ACTIVE_LAST_DAYS:-90}
      - META_AD_ACCOUNTS_SYNC_LIMIT=${META_AD_ACCOUNTS_SYNC_LIMIT:-500}
      - META_STRUCTURE_SYNC_ENABLED=${META_STRUCTURE_SYNC_ENABLED:-true}
      - META_STRUCTURE_SYNC_INTERVAL_MINUTES=${META_STRUCTURE_SYNC_INTERVAL_MINUTES:-360}
      - META_STRUCTURE_SYNC_LIMIT=${META_STRUCTURE_SYNC_LIMIT:-500}
      - META_STRUCTURE_SYNC_MAX_PAGES=${META_STRUCTURE_SYNC_MAX_PAGES:-10}
      - META_CREATIVES_SYNC_ENABLED=${META_CREATIVES_SYNC_ENABLED:-false}
      - META_CREATIVES_SYNC_INTERVAL_MINUTES=${META_CREATIVES_SYNC_INTERVAL_MINUTES:-720}
      - META_CREATIVES_SYNC_LIMIT=${META_CREATIVES_SYNC_LIMIT:-250}
      - META_CREATIVES_SYNC_MAX_PAGES=${META_CREATIVES_SYNC_MAX_PAGES:-10}
      - META_INSIGHTS_SYNC_ENABLED=${META_INSIGHTS_SYNC_ENABLED:-true}
      - META_INSIGHTS_SYNC_INTERVAL_MINUTES=${META_INSIGHTS_SYNC_INTERVAL_MINUTES:-60}
      - META_INSIGHTS_SYNC_DAYS=${META_INSIGHTS_SYNC_DAYS:-30}
      - META_INSIGHTS_SYNC_MAX_PAGES=${META_INSIGHTS_SYNC_MAX_PAGES:-10}
      - META_INSIGHTS_SYNC_ACCOUNT_LIMIT=${META_INSIGHTS_SYNC_ACCOUNT_LIMIT:-50}
      - META_INSIGHTS_SYNC_UNMAPPED_ACCOUNTS=${META_INSIGHTS_SYNC_UNMAPPED_ACCOUNTS:-true}
      - META_BREAKDOWN_SYNC_ENABLED=${META_BREAKDOWN_SYNC_ENABLED:-true}
      - RULE_MONITOR_ENABLED=${RULE_MONITOR_ENABLED:-true}
      - RULE_MONITOR_INTERVAL_MINUTES=${RULE_MONITOR_INTERVAL_MINUTES:-60}
      - FAILED_SYNC_RETRY_ENABLED=${FAILED_SYNC_RETRY_ENABLED:-true}
      - FAILED_SYNC_RETRY_INTERVAL_MINUTES=${FAILED_SYNC_RETRY_INTERVAL_MINUTES:-60}
      - FAILED_SYNC_RETRY_LIMIT=${FAILED_SYNC_RETRY_LIMIT:-10}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped

  mcp:
    build: .
    mem_limit: 192m
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "dist/apps/mcp/src/index.js"]
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=160
      - READ_ONLY_MODE=true
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL in .env}
      - SERVER_URL=${MCP_SERVER_URL:-http://localhost:3001}
      - PORT=3001
      - API_KEY=${API_KEY:-}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:?set ADMIN_USERNAME in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET in .env}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN:-}
      - META_TOKENS=${META_TOKENS:-}
      - META_API_VERSION=${META_API_VERSION:-v25.0}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://claude.ai}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:?set TOKEN_ENCRYPTION_KEY in .env}
      - SYNC_SCHEDULER_ENABLED=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped

volumes:
  postgres-data:
